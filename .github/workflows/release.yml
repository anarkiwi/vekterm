name: Release

# On a version tag (e.g. v0.1.0): run the full check suite, then publish a
# source tarball as a GitHub Release. The binary is built on the target Pi
# (`make pitrex`), so the release ships source, not architecture-specific bins.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: build and test
        run: make check
      - name: package source
        run: |
          ver="${GITHUB_REF_NAME}"
          git archive --format=tar.gz --prefix="vekterm-${ver}/" -o "vekterm-${ver}.tar.gz" HEAD
          sha256sum "vekterm-${ver}.tar.gz" > "vekterm-${ver}.tar.gz.sha256"
      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "vekterm ${GITHUB_REF_NAME}" \
            --generate-notes \
            "vekterm-${GITHUB_REF_NAME}.tar.gz" \
            "vekterm-${GITHUB_REF_NAME}.tar.gz.sha256"
