name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: check formatting
        run: make format-check

  test:
    name: Test (${{ matrix.os }}, ${{ matrix.cc }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, cc: gcc }
          - { os: ubuntu-latest, cc: clang }
          - { os: macos-latest, cc: clang }
    steps:
      - uses: actions/checkout@v6
      - name: compiler version
        run: ${{ matrix.cc }} --version
      - name: unit tests
        run: make test CC=${{ matrix.cc }}

  host:
    name: Host tool & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: build host tool (stub backend)
        run: make
      - name: selftest
        run: ./vekterm --selftest
      - name: decode a frame end-to-end (dry run)
        run: |
          printf '\x80\x00\x01\x90\x20\xF0\xF0\xF0\x52\x00\x48\x02\x42\x64\x48\x02\x60\x00\x00\x05\x00\x00\x00\x00' > frame.bin
          ./vekterm --dry-run --input frame.bin --once --verbose

  image:
    name: Baremetal image (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: build kernel.img + vekterm.img in Docker
        run: make docker
      - name: verify artifacts
        run: |
          test -s out/kernel.img
          test -s out/vekterm.img
          file out/vekterm.img | grep -q 'DOS/MBR boot sector'
          ls -l out/
      - uses: actions/upload-artifact@v7
        with:
          name: vekterm-image
          path: |
            out/kernel.img
            out/vekterm.img
